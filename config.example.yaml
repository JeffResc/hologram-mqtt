# Hologram API configuration
hologram:
  # API key from Hologram dashboard (Settings > API)
  # Can also be set via HOLOGRAM_API_KEY environment variable
  api_key: ""

# MQTT broker configuration
mqtt:
  # Broker address (required)
  # Can also be set via MQTT_BROKER environment variable
  broker: "tcp://localhost:1883"

  # Broker credentials (optional)
  # Can also be set via MQTT_USERNAME / MQTT_PASSWORD environment variables
  username: ""
  password: ""

  # MQTT client ID (default: hologram-mqtt)
  # Can also be set via MQTT_CLIENT_ID environment variable
  client_id: "hologram-mqtt"

  # Topic prefix for all MQTT messages (default: hologram-mqtt)
  # Can also be set via MQTT_TOPIC_PREFIX environment variable
  topic_prefix: "hologram-mqtt"

# Home Assistant MQTT discovery configuration
discovery:
  # Discovery topic prefix (default: homeassistant)
  # Can also be set via DISCOVERY_PREFIX environment variable
  prefix: "homeassistant"

  # Enable/disable discovery (default: true)
  # Can also be set via DISCOVERY_ENABLED environment variable
  enabled: true

# How often to poll the Hologram API for device updates (default: 5m)
# Can also be set via POLL_INTERVAL environment variable
# Accepts Go duration strings (e.g., "5m", "30s", "1h") or seconds as integer
poll_interval: 5m

# Log level: debug, info, warn, error (default: info)
# Can also be set via LOG_LEVEL environment variable
log_level: info
