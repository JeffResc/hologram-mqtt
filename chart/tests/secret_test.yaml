suite: secret tests
templates:
  - templates/secret.yaml
release:
  name: test-release
  namespace: test-ns
tests:
  - it: should create hologram secret by default
    set:
      hologram.apiKey: test-api-key
    asserts:
      - containsDocument:
          kind: Secret
          apiVersion: v1
          name: test-release-hologram-mqtt-hologram

  - it: should not create hologram secret when existingSecret is set
    set:
      hologram.existingSecret: my-existing-secret
    asserts:
      - not: true
        containsDocument:
          kind: Secret
          apiVersion: v1
          name: test-release-hologram-mqtt-hologram

  - it: should create MQTT secret when username is set
    set:
      mqtt.username: testuser
      mqtt.password: testpass
    documentIndex: 1
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: test-release-hologram-mqtt-mqtt

  - it: should not create MQTT secret when no credentials
    asserts:
      - not: true
        containsDocument:
          kind: Secret
          apiVersion: v1
          name: test-release-hologram-mqtt-mqtt

  - it: should not create MQTT secret when existingSecret is set
    set:
      mqtt.existingSecret: my-mqtt-secret
    asserts:
      - not: true
        containsDocument:
          kind: Secret
          apiVersion: v1
          name: test-release-hologram-mqtt-mqtt
